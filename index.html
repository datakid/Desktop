<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lx Desktop</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gradient-blue:   linear-gradient(145deg, #0a95ff 0%, #007aff 40%, #0062d9 70%, #0047a3 100%);
      --gradient-purple: linear-gradient(145deg, #bf5af2 0%, #af52de 40%, #9145c2 70%, #7d3bb8 100%);
      --gradient-teal:   linear-gradient(145deg, #64d2ff 0%, #35c7e4 40%, #00a5c4 70%, #0089a3 100%);
      --gradient-red:    linear-gradient(145deg, #ff453a 0%, #ff3b30 40%, #e0281e 70%, #c41f16 100%);
      --gradient-orange: linear-gradient(145deg, #ff9f0a 0%, #ff9500 40%, #e08300 70%, #c77100 100%);
      --dock-padding:    clamp(10px, 1vw, 14px);
      --dock-icon-size:  clamp(52px, 5vw, 76px);
      --window-radius:   clamp(20px, 1.8vw, 28px);
      --blur:            42px;
      --ease-spring:     cubic-bezier(0.2, 0.8, 0.2, 1);
      --ease-bounce:     cubic-bezier(0.34, 1.56, 0.64, 1);
      --t-theme:         0.75s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg:           linear-gradient(280deg, #030407, #0d0f23, #121030, #1c1035, #0d0f23, #030407);
      --text:         #f0f2f5;
      --text2:        rgba(220, 225, 235, 0.52);
      --glass:        rgba(20, 23, 38, 0.6);
      --border:       rgba(255, 255, 255, 0.072);
      --shadow:       0 24px 64px rgba(0,0,0,0.42), 0 0 0 1px rgba(255,255,255,0.04) inset;
      --inset-glow:   inset 0 0 40px rgba(255,255,255,0.022), inset 0 1px 0 rgba(255,255,255,0.06);
      --highlight:    rgba(255,255,255,0.065);
      --spot:         rgba(0, 122, 255, 0.2);
      --avatar-bg:    linear-gradient(135deg, #bf5af2, #7d3bb8);
      --avatar-color: white;
    }

    [data-theme="light"] {
      --bg:           linear-gradient(170deg, #ffffff 0%, #f9fbff 25%, #f0f6ff 50%, #fff9fc 75%, #ffffff 100%);
      --text:         #101623;
      --text2:        rgba(20, 30, 50, 0.52);
      --glass:        rgba(255, 255, 255, 0.6);
      --border:       rgba(0, 0, 0, 0.072);
      --shadow:       0 24px 60px rgba(60,70,100,0.13), 0 0 0 1px rgba(0,0,0,0.022) inset;
      --inset-glow:   inset 0 0 30px rgba(80,100,140,0.032), inset 0 1px 0 rgba(255,255,255,0.8);
      --highlight:    rgba(180, 200, 255, 0.18);
      --spot:         rgba(100, 180, 255, 0.3);
      --avatar-bg:    linear-gradient(135deg, #e9d8ff, #d7baff);
      --avatar-color: #5e2a80;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      overflow: hidden;
      transition: background var(--t-theme), color var(--t-theme);
    }

    @keyframes bgDark  { 0%,100%{background-position:0% 50%}  50%{background-position:100% 50%} }
    @keyframes bgLight { 0%,100%{background-position:0% 0%}   50%{background-position:100% 100%} }
    @keyframes float   { 0%,100%{transform:translate(-50%,-50%) translateY(0)}  50%{transform:translate(-50%,-50%) translateY(-14px)} }
    @keyframes widgetIn{ to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes pulse   { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }
    @keyframes dotGlow { 0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.5)} 50%{box-shadow:0 0 0 5px rgba(255,255,255,0)} }
    @keyframes dotGlowL{ 0%,100%{box-shadow:0 0 0 0 rgba(0,122,255,.5)}   50%{box-shadow:0 0 0 5px rgba(0,122,255,0)} }
    @keyframes ripple  { to{transform:translate(-50%,-50%) scale(30);opacity:0} }

    .desktop {
      position: fixed; inset: 0;
      background: var(--bg); background-size: 300% 300%;
      z-index: -3; transition: background 1.2s cubic-bezier(0.4,0,0.2,1);
      will-change: background-position;
    }
    [data-theme="dark"] .desktop { animation: bgDark 45s ease infinite; }
    [data-theme="light"] .desktop { animation: bgLight 50s ease infinite; }

    .desktop-title {
      position: fixed; top: 50%; left: 50%;
      font-size: 15vw; font-weight: 800; letter-spacing: -0.03em;
      z-index: -1; pointer-events: none; user-select: none;
      animation: float 8s ease-in-out infinite;
      transition: color var(--t-theme);
    }
    [data-theme="dark"] .desktop-title { color: rgba(255,255,255,0.028); }
    [data-theme="light"] .desktop-title { color: rgba(0,30,80,0.04); }

    .noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 160px 160px; transition: opacity var(--t-theme);
    }
    [data-theme="dark"] .noise { opacity: 0.038; }
    [data-theme="light"] .noise { opacity: 0.018; }

    .theme-flash { position: fixed; inset: 0; z-index: 9000; pointer-events: none; opacity: 0; background: white; }

    .cursor-light {
      position: fixed; width: 900px; height: 900px;
      border-radius: 50%; background: var(--spot);
      filter: blur(260px); z-index: -2; pointer-events: none;
      transform: translate(-50%,-50%); transition: background 0.7s ease;
      will-change: transform;
    }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .particle  { position: absolute; border-radius: 50%; opacity: 0; will-change: transform,opacity; }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 72px;
      padding: 0 40px;
      background: var(--glass);
      backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000;
      transition: background var(--t-theme), border-color var(--t-theme), box-shadow var(--t-theme);
    }
    .top-bar::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border) 20%, rgba(255,255,255,0.12) 50%, var(--border) 80%, transparent 100%);
      pointer-events: none;
    }

    .top-bar-item {
      padding: 10px 20px; border-radius: 18px;
      font-size: 16px; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: 12px;
      transition: all 0.32s var(--ease-spring);
      position: relative; overflow: hidden; cursor: pointer;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 4px 14px rgba(0,0,0,0.08), inset 0 0 10px rgba(255,255,255,0.02);
    }
    [data-theme="light"] .top-bar-item {
      background: rgba(255,255,255,0.28);
      box-shadow: 0 4px 14px rgba(100,116,139,0.06), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .top-bar-item::before {
      content: ""; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--highlight), transparent);
      transition: left 0.52s var(--ease-spring);
    }
    .top-bar-item:not(.theme-toggle-container):hover::before { left: 100%; }
    .top-bar-item:hover { transform: translateY(-3px) scale(1.03); }
    [data-theme="dark"] .top-bar-item:hover { background: rgba(255,255,255,0.07); box-shadow: 0 8px 22px rgba(0,0,0,0.16), inset 0 0 14px rgba(255,255,255,0.04); }
    [data-theme="light"] .top-bar-item:hover { background: rgba(255,255,255,0.4); box-shadow: 0 8px 22px rgba(100,116,139,0.11), inset 0 1px 0 rgba(255,255,255,0.95); }
    .top-bar-item:active { transform: translateY(0) scale(0.99); transition-duration: 0.08s; }

    .user-profile { padding: 8px 16px 8px 10px; gap: 15px; }
    .user-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px;
      background: var(--avatar-bg); color: var(--avatar-color);
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      transition: all 0.4s var(--ease-bounce);
    }
    [data-theme="light"] .user-avatar { border-color: rgba(0,0,0,0.05); box-shadow: 0 6px 18px rgba(100,116,139,0.16); }
    .user-profile:hover .user-avatar { transform: scale(1.12) rotate(6deg); }
    .user-name { font-size: 16px; font-weight: 600; letter-spacing: 0.4px; }

    .theme-toggle-container { padding: 10px 15px; cursor: default; }
    .theme-toggle-container i { font-size: 16px; color: var(--text2); transition: color 0.4s ease, text-shadow 0.4s ease, transform 0.5s var(--ease-bounce); }
    [data-theme="light"] .theme-toggle-container .fa-sun  { color: #ffc53e; text-shadow: 0 0 14px #ffc53e88; transform: rotate(25deg) scale(1.15); }
    [data-theme="dark"]  .theme-toggle-container .fa-moon { color: #a7c7ff; text-shadow: 0 0 14px #a7c7ff88; transform: rotate(-10deg); }

    .theme-switch { position: relative; display: inline-block; width: 48px; height: 26px; }
    .theme-switch input { display: none; }
    .slider { position: absolute; cursor: pointer; inset: 0; border-radius: 26px; transition: background-color .4s ease; }
    [data-theme="light"] .slider { background: rgba(0,0,0,0.1); }
    [data-theme="dark"]  .slider { background: rgba(255,255,255,0.1); }
    .slider:before {
      position: absolute; content: ""; height: 20px; width: 20px;
      left: 3px; bottom: 3px; border-radius: 50%;
      transition: all .42s cubic-bezier(0.2,1,0.3,1);
      box-shadow: 0 3px 8px rgba(0,0,0,0.22);
    }
    [data-theme="light"] .slider:before { background: #fff; }
    [data-theme="dark"]  .slider:before { background: #d0d7e5; }
    input:checked + .slider:before { transform: translateX(22px); }

    .clock-widget span { font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }

    .system-widgets {
      position: fixed; top: 102px; right: 40px;
      width: 400px; display: flex; flex-direction: column; gap: 30px; z-index: 100;
    }

    .widget {
      background: var(--glass);
      backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border); border-radius: var(--window-radius);
      padding: 40px;
      box-shadow: var(--shadow), var(--inset-glow);
      position: relative; overflow: hidden;
      animation: widgetIn 0.9s var(--ease-spring) forwards;
      opacity: 0; transform: translateY(30px) scale(0.96);
      transform-style: preserve-3d; cursor: default;
      will-change: transform, box-shadow;
    }
    .widget::before {
      content: ""; position: absolute;
      top: var(--my, -50%); left: var(--mx, -50%);
      width: 200%; height: 200%;
      background: radial-gradient(circle at center, var(--highlight), transparent 50%);
      transition: top 0.45s ease-out, left 0.45s ease-out;
      z-index: 0; pointer-events: none;
    }
    .widget::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }
    [data-theme="light"] .widget::after { background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, transparent 55%); }

    .widget-header {
      font-size: 24px; font-weight: 700; margin-bottom: 30px;
      display: flex; align-items: center; justify-content: space-between;
      color: var(--text); position: relative; z-index: 1;
    }
    .widget-header i { font-size: 26px; color: var(--text2); transition: all 0.4s var(--ease-bounce); }
    .widget:hover .widget-header i { transform: scale(1.2) rotate(10deg); color: var(--text); }
    .widget-content { display: flex; flex-direction: column; gap: 24px; position: relative; z-index: 1; }

    .quick-link {
      display: flex; align-items: center;
      padding: 22px 28px; border: none; border-radius: 22px;
      font-size: 17px; font-weight: 600; color: var(--text);
      cursor: pointer; position: relative; overflow: hidden;
      transition: all 0.3s var(--ease-spring);
      background: rgba(255,255,255,0.035);
      box-shadow: 0 5px 14px rgba(0,0,0,0.09), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    [data-theme="light"] .quick-link {
      background: rgba(255,255,255,0.52);
      box-shadow: 0 5px 14px rgba(100,116,139,0.07), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .quick-link::after {
      content: ''; position: absolute; bottom: 10px; left: 28px;
      width: 0; height: 2px; background: var(--text);
      transition: width 0.35s var(--ease-spring);
    }
    .quick-link:hover::after { width: calc(100% - 56px); }
    .quick-link:hover { transform: translateX(14px) scale(1.025); }
    [data-theme="dark"] .quick-link:hover  { background: rgba(255,255,255,0.055); box-shadow: 0 9px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.06); }
    [data-theme="light"] .quick-link:hover { background: rgba(255,255,255,0.7); box-shadow: 0 9px 24px rgba(100,116,139,0.12), inset 0 1px 0 rgba(255,255,255,0.95); }
    .quick-link i { margin-right: 20px; font-size: 24px; color: var(--text2); transition: all 0.32s var(--ease-bounce); }
    .quick-link:hover i { color: var(--text); transform: scale(1.18) rotate(-4deg); }

    .ripple {
      position: absolute; width: 8px; height: 8px;
      background: rgba(255,255,255,0.28); border-radius: 50%;
      transform: translate(-50%,-50%) scale(0);
      animation: ripple 0.65s ease-out forwards; pointer-events: none;
    }

    .dock-container {
      position: fixed; bottom: 35px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000; perspective: 1600px; will-change: transform;
    }

    .dock-reflection {
      position: absolute; top: 100%; left: 5%; right: 5%; height: 50%;
      background: var(--glass);
      border-radius: 0 0 38px 38px;
      filter: blur(10px); opacity: 0.12;
      transform: scaleY(-1) translateY(-8px);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.35), transparent);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.35), transparent);
      pointer-events: none; transition: opacity var(--t-theme);
    }
    [data-theme="light"] .dock-reflection { opacity: 0.05; }

    .dock {
      background: var(--glass);
      backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border); border-radius: 38px;
      padding: var(--dock-padding) calc(var(--dock-padding) + 8px);
      display: flex; gap: 22px;
      box-shadow: var(--shadow), 0 0 80px rgba(0,0,0,0.1), var(--inset-glow);
      position: relative; transition: all 0.5s var(--ease-spring);
      transform-style: preserve-3d;
    }
    .dock::before {
      content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
      border-radius: 50%;
    }
    .dock:hover {
      transform: translateY(-15px) rotateX(6deg) scale(1.03);
      box-shadow: var(--shadow), 0 30px 80px rgba(0,0,0,0.18), var(--inset-glow);
    }
    [data-theme="light"] .dock:hover { box-shadow: var(--shadow), 0 30px 80px rgba(80,90,120,0.2), var(--inset-glow); }

    .dock-item {
      width: var(--dock-icon-size); height: var(--dock-icon-size);
      border-radius: 24px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; position: relative; overflow: visible;
      transform-style: preserve-3d;
      transition: transform 0.15s cubic-bezier(0,0,0.2,1), box-shadow 0.2s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.14), inset 0 0 14px rgba(255,255,255,0.025);
      will-change: transform;
    }
    [data-theme="light"] .dock-item { box-shadow: 0 6px 18px rgba(100,116,139,0.08), inset 0 0 14px rgba(0,0,0,0.012); }

    .dock-item-glare {
      position: absolute; top: 5%; left: 10%; width: 80%; height: 40%;
      border-radius: 18px 18px 50% 50% / 12px 12px 30% 30%;
      opacity: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.25), transparent 80%);
      transition: opacity 0.18s ease; pointer-events: none; z-index: 1;
    }
    [data-theme="light"] .dock-item-glare { background: linear-gradient(to bottom, rgba(255,255,255,0.65), transparent 80%); }
    .dock-item:hover .dock-item-glare { opacity: 1; }

    .dock-item i {
      font-size: 30px; color: #fff;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.38));
      margin-bottom: 8px;
      transition: transform 0.15s ease;
      transform: translateZ(10px);
      position: relative; z-index: 2;
      will-change: transform;
    }
    .dock-item:hover i { transform: translateZ(16px) scale(1.07); }

    .dock-item span {
      font-size: 13px; font-weight: 600; color: #fff;
      opacity: 0; transform: translateY(18px) translateZ(5px);
      transition: opacity 0.15s ease 0.03s, transform 0.15s ease 0.03s;
      text-shadow: 0 2px 6px rgba(0,0,0,0.45);
      white-space: nowrap; position: relative; z-index: 2;
    }
    .dock-item:hover span { opacity: 1; transform: translateY(0) translateZ(5px); }

    .active-indicator {
      position: absolute; bottom: -12px;
      width: 6px; height: 6px; border-radius: 50%; background: #fff;
      transform: scale(0); transition: all 0.4s var(--ease-bounce); z-index: 2;
    }
    .dock-item.active .active-indicator { transform: scale(1); animation: dotGlow 2.5s ease-in-out infinite; }
    [data-theme="light"] .active-indicator { background: #007aff; }
    [data-theme="light"] .dock-item.active .active-indicator { animation: dotGlowL 2.5s ease-in-out infinite; }

    .dock-item.adventure { background: var(--gradient-blue); }
    .dock-item.continue  { background: var(--gradient-purple); }
    .dock-item.compare   { background: var(--gradient-teal); }
    .dock-item.settings  { background: var(--gradient-orange); }
    .dock-item.exit      { background: var(--gradient-red); }

    [data-theme="dark"] .dock-item.adventure:hover { box-shadow: 0 16px 44px rgba(10,132,255,0.55); }
    [data-theme="dark"] .dock-item.continue:hover  { box-shadow: 0 16px 44px rgba(191,90,242,0.55); }
    [data-theme="dark"] .dock-item.compare:hover   { box-shadow: 0 16px 44px rgba(53,199,228,0.55); }
    [data-theme="dark"] .dock-item.settings:hover  { box-shadow: 0 16px 44px rgba(255,159,10,0.55); }
    [data-theme="dark"] .dock-item.exit:hover      { box-shadow: 0 16px 44px rgba(255,69,58,0.55); }
    [data-theme="light"] .dock-item.adventure:hover{ box-shadow: 0 16px 44px rgba(10,132,255,0.4); }
    [data-theme="light"] .dock-item.continue:hover { box-shadow: 0 16px 44px rgba(191,90,242,0.4); }
    [data-theme="light"] .dock-item.compare:hover  { box-shadow: 0 16px 44px rgba(53,199,228,0.4); }
    [data-theme="light"] .dock-item.settings:hover { box-shadow: 0 16px 44px rgba(255,159,10,0.4); }
    [data-theme="light"] .dock-item.exit:hover     { box-shadow: 0 16px 44px rgba(255,69,58,0.4); }

    .quick-actions {
      position: fixed; top: 50%; left: 40px; transform: translateY(-50%);
      background: var(--glass);
      backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border); border-radius: var(--window-radius);
      padding: 28px; display: flex; flex-direction: column; gap: 24px;
      box-shadow: var(--shadow); z-index: 900;
      transition: background var(--t-theme), border-color var(--t-theme), box-shadow var(--t-theme);
    }

    .quick-action-btn {
      width: 66px; height: 66px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; overflow: hidden;
      transition: all 0.3s var(--ease-spring); will-change: transform;
    }
    [data-theme="dark"] .quick-action-btn  { background: rgba(255,255,255,0.042); box-shadow: 0 7px 18px rgba(0,0,0,0.18), inset 0 0 16px rgba(255,255,255,0.022); }
    [data-theme="light"] .quick-action-btn { background: rgba(255,255,255,0.65); box-shadow: 0 7px 18px rgba(100,116,139,0.1), inset 0 1px 0 rgba(255,255,255,0.9); }
    .quick-action-btn:hover { transform: scale(1.22) translateX(9px) rotate(5deg); }
    [data-theme="dark"] .quick-action-btn:hover  { background: rgba(255,255,255,0.075); box-shadow: 0 12px 32px rgba(0,0,0,0.26), inset 0 0 20px rgba(255,255,255,0.05); }
    [data-theme="light"] .quick-action-btn:hover { background: rgba(255,255,255,0.82); box-shadow: 0 12px 32px rgba(100,116,139,0.17), inset 0 1px 0 rgba(255,255,255,0.95); }
    .quick-action-btn:active { transform: scale(1.1) translateX(4px) rotate(2deg); transition-duration: 0.08s; }
    .quick-action-btn i { font-size: 26px; color: var(--text); transition: all 0.3s var(--ease-spring); }
    .quick-action-btn:hover i { transform: scale(1.15); filter: drop-shadow(0 3px 10px rgba(0,0,0,0.35)); }
    [data-theme="light"] .quick-action-btn:hover i { filter: drop-shadow(0 3px 10px rgba(80,90,120,0.28)); }

    .desktop-shortcut {
      position: fixed; top: 110px; left: 40px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      cursor: pointer; z-index: 500;
    }
    .desktop-shortcut .icon-container {
      width: 80px; height: 80px; background: var(--glass);
      backdrop-filter: blur(var(--blur)); border: 1px solid var(--border);
      border-radius: 24px; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.4s var(--ease-bounce); will-change: transform;
      position: relative; overflow: hidden;
    }
    .desktop-shortcut .icon-container::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
      pointer-events: none;
    }
    [data-theme="light"] .desktop-shortcut .icon-container::after { background: linear-gradient(to bottom, rgba(255,255,255,0.6), transparent); }
    .desktop-shortcut .icon-container i { font-size: 32px; color: var(--text); transition: all 0.32s ease; }
    .desktop-shortcut span { font-size: 14px; font-weight: 600; color: var(--text); }
    .desktop-shortcut:hover .icon-container { transform: scale(1.12) translateY(-6px); box-shadow: 0 24px 48px rgba(0,0,0,0.22); }
    [data-theme="light"] .desktop-shortcut:hover .icon-container { box-shadow: 0 24px 48px rgba(80,90,120,0.2); }
    .desktop-shortcut:hover .icon-container i { transform: scale(1.12) rotate(5deg); }

    .app-window {
      position: fixed; top: 50%; left: 50%;
      width: 60vw; max-width: 800px; height: 65vh;
      background: var(--glass);
      backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border); border-radius: var(--window-radius);
      box-shadow: var(--shadow); z-index: 950;
      display: flex; flex-direction: column; overflow: hidden;
      transform: translate(-50%, -50%) scale(0.94);
      opacity: 0; pointer-events: none;
      transition: transform 0.48s var(--ease-bounce), opacity 0.4s ease;
      will-change: transform, opacity;
    }
    .app-window.visible  { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    .app-window.minimized{
      pointer-events: none;
      transform: translate(-50%, 120vh) scale(0.45) rotate(-18deg) !important;
      opacity: 0 !important;
      transition: transform 0.6s cubic-bezier(0.6,-0.28,0.735,0.045), opacity 0.5s ease !important;
    }

    .window-title-bar {
      display: flex; align-items: center;
      padding: 0 20px; height: 55px; flex-shrink: 0;
      border-bottom: 1px solid var(--border); cursor: default;
      position: relative;
    }
    .window-title-bar::after {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }
    .window-controls { display: flex; gap: 8px; margin-right: 15px; }
    .window-controls .control-btn {
      width: 14px; height: 14px; border-radius: 50%; cursor: pointer;
      transition: transform 0.22s var(--ease-bounce), box-shadow 0.2s ease;
    }
    .control-btn.close    { background: #ff5f56; }
    .control-btn.minimize { background: #ffbd2e; }
    .control-btn.close:hover    { transform: scale(1.2); box-shadow: 0 0 10px 3px rgba(255,95,86,0.55); }
    .control-btn.minimize:hover { transform: scale(1.2); box-shadow: 0 0 10px 3px rgba(255,189,46,0.55); }
    .control-btn:active { transform: scale(1.05); transition-duration: 0.08s; }
    .window-title { font-size: 16px; font-weight: 600; color: var(--text); }

    .window-content {
      flex-grow: 1; position: relative;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .preview-placeholder {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; color: var(--text2);
      opacity: 1; transition: opacity 0.3s ease;
      position: absolute; pointer-events: none;
    }
    .preview-placeholder i { font-size: 48px; margin-bottom: 16px; display: block; }
    .preview-placeholder span { font-size: 18px; font-weight: 500; }

    .window-content iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; background: transparent;
      opacity: 0; transition: opacity 0.35s ease;
    }

    .exit-confirmation {
      position: absolute;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      color: var(--text); opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
    }
    .exit-confirmation i { font-size: 64px; color: #ff453a; filter: drop-shadow(0 4px 20px rgba(255,69,58,0.5)); animation: pulse 2.8s ease-in-out infinite; }
    .exit-confirmation span { font-size: 22px; font-weight: 600; }
    .exit-confirmation p   { font-size: 16px; font-weight: 500; color: var(--text2); }

    @media (max-width: 1600px) {
      .system-widgets { right: 30px; width: 380px; }
      .quick-actions, .desktop-shortcut { left: 30px; }
      .top-bar { padding: 0 30px; }
      .app-window { width: 58vw; max-width: 800px; }
    }
    @media (max-width: 1440px) and (max-height: 800px) {
      .system-widgets { right: 20px; width: 320px; top: 90px; gap: 20px; }
      .widget { padding: 25px; }
      .widget-header { font-size: 20px; margin-bottom: 20px; }
      .widget-content { gap: 18px; }
      .quick-link { padding: 16px 20px; font-size: 15px; border-radius: 18px; }
      .quick-link i { margin-right: 15px; font-size: 22px; }
      .quick-actions { left: 20px; padding: 20px; gap: 16px; }
      .quick-action-btn { width: 56px; height: 56px; border-radius: 20px; }
      .quick-action-btn i { font-size: 22px; }
      .desktop-shortcut { top: 95px; left: 20px; }
      .desktop-shortcut .icon-container { width: 70px; height: 70px; border-radius: 22px; }
      .desktop-shortcut .icon-container i { font-size: 28px; }
      .desktop-title { font-size: 12vw; }
      .dock-container { bottom: 25px; }
      .dock { gap: 16px; padding: 8px 12px; --dock-icon-size: clamp(48px, 4.8vw, 72px); }
      .app-window { width: 65vw; max-width: 700px; height: 60vh; }
    }
    @media (max-width: 1440px) and (min-height: 801px) {
      .system-widgets { right: 20px; width: 340px; }
      .quick-actions, .desktop-shortcut { left: 20px; }
      .app-window { width: 60vw; max-width: 650px; }
      .dock { gap: 18px; }
    }
    @media (max-width: 1200px) {
      .system-widgets { width: 300px; }
      .widget-header { font-size: 22px; }
      .quick-link { font-size: 16px; padding: 18px 22px; }
      .app-window { width: 65vw; max-width: 540px; }
      .desktop-title { font-size: 16vw; }
    }
    @media (max-height: 768px) and (min-width: 1200px) {
      .system-widgets { top: 80px; transform: scale(0.85); transform-origin: top right; gap: 15px; }
      .quick-actions { transform: scale(0.9) translateY(-50%); transform-origin: left center; }
      .desktop-shortcut { top: 85px; transform: scale(0.9); }
      .dock-container { bottom: 15px; }
      .desktop-title { font-size: 10vw; }
      .app-window { height: 70vh; }
    }
    @media (max-width: 1024px) {
      body { overflow-x: hidden; }
      .top-bar { padding: 0 15px; height: 64px; }
      .top-bar-item { padding: 8px 15px; font-size: 14px; }
      .user-avatar { width: 38px; height: 38px; }
      .system-widgets { top: 84px; right: 15px; width: 280px; gap: 20px; }
      .quick-actions { left: 15px; padding: 20px; gap: 18px; }
      .quick-action-btn { width: 54px; height: 54px; }
      .desktop-shortcut { top: 90px; left: 15px; }
      .desktop-shortcut .icon-container { width: 64px; height: 64px; border-radius: 20px; }
      .desktop-shortcut .icon-container i { font-size: 26px; }
      .desktop-shortcut span { font-size: 13px; }
      .app-window { width: 70vw; max-width: 560px; height: 60vh; }
      .dock-container { bottom: 20px; }
      .dock { gap: 15px; border-radius: 30px; --dock-icon-size: clamp(44px, 6vw, 64px); }
    }
    @media (max-width: 768px) {
      .desktop-title { font-size: clamp(60px, 20vw, 110px); top: 50%; }
      .top-bar { flex-wrap: wrap; height: auto; padding: 10px; justify-content: center; gap: 10px; }
      .system-widgets { display: none; }
      .quick-actions { top: auto; bottom: 100px; left: auto; right: 15px; transform: translateY(0); flex-direction: row; padding: 12px; width: auto; border-radius: 20px; }
      .quick-action-btn { width: 48px; height: 48px; border-radius: 16px; }
      .quick-action-btn i { font-size: 20px; }
      .desktop-shortcut { display: none; }
      .app-window { width: 92vw; height: 70vh; max-width: 92%; top: 50%; border-radius: var(--window-radius); }
      .window-title-bar { height: 45px; }
      .dock-container { bottom: 15px; width: 95vw; }
      .dock { justify-content: space-around; padding: var(--dock-padding); }
      .dock-item span { display: none; }
      .dock-item i { font-size: 24px; margin-bottom: 0; }
      .active-indicator { bottom: -8px; }
    }
    @media (max-height: 750px) {
      .dock-container { bottom: 20px; }
      .system-widgets { transform: scale(0.9); transform-origin: top right; }
      .desktop-title { font-size: 13vw; }
      .app-window { height: 75vh; }
    }
    @media (max-height: 650px) {
      .system-widgets { display: none; }
      .app-window { height: 80vh; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="desktop"></div>
  <div class="desktop-title">LinkExpress</div>
  <div class="noise"></div>
  <div class="theme-flash" id="themeFlash"></div>
  <div class="cursor-light"></div>
  <div class="particles" id="particles"></div>

  <div class="top-bar">
    <div class="user-profile top-bar-item">
      <div class="user-avatar"><span>AD</span></div>
      <div class="user-name">Admin</div>
    </div>
    <div class="clock-widget top-bar-item">
      <i class="fas fa-clock"></i>
      <span id="utcClock">Loading...</span>
    </div>
    <div class="theme-toggle-container top-bar-item">
      <i class="fas fa-sun"></i>
      <label class="theme-switch" for="theme-checkbox">
        <input type="checkbox" id="theme-checkbox" />
        <div class="slider"></div>
      </label>
      <i class="fas fa-moon"></i>
    </div>
  </div>

  <div class="system-widgets">
    <div class="widget" id="quickLinksWidget">
      <div class="widget-header">Quick Links <i class="fas fa-link"></i></div>
      <div class="widget-content">
        <button class="quick-link" onclick="window.open('https://protocols-one.vercel.app/', '_blank')">
          <i class="fas fa-shield-alt"></i> Protocols
        </button>
        <button class="quick-link" onclick="window.open('https://searchbar-five-beta.vercel.app/', '_blank')">
          <i class="fas fa-list"></i> The List
        </button>
        <button class="quick-link" id="pricesButton">
          <i class="fas fa-dollar-sign"></i> Prices
        </button>
      </div>
    </div>
  </div>

  <div class="quick-actions">
    <div class="quick-action-btn" onclick="window.open('https://finalapp-nine.vercel.app/', '_blank')"><i class="fas fa-rocket"></i></div>
    <div class="quick-action-btn" onclick="window.open('https://dashboard2-iota.vercel.app/', '_blank')"><i class="fas fa-compass"></i></div>
    <div class="quick-action-btn" onclick="window.open('https://dashboard-yearly.vercel.app/', '_blank')"><i class="fas fa-chart-line"></i></div>
    <div class="quick-action-btn" onclick="window.open('https://josn.vercel.app/', '_blank')"><i class="fas fa-folder-open"></i></div>
    <div class="quick-action-btn" id="quickExit"><i class="fas fa-sign-out-alt"></i></div>
  </div>

  <div class="dock-container">
    <div class="dock-reflection"></div>
    <div class="dock">
      <div class="dock-item adventure" data-app="new" data-name="New Adventure" data-url="https://finalapp-nine.vercel.app/">
        <div class="dock-item-glare"></div>
        <i class="fas fa-rocket"></i><span>New</span><div class="active-indicator"></div>
      </div>
      <div class="dock-item continue" data-app="load" data-name="Load Dashboard" data-url="https://dashboard2-iota.vercel.app/">
        <div class="dock-item-glare"></div>
        <i class="fas fa-compass"></i><span>Load</span><div class="active-indicator"></div>
      </div>
      <div class="dock-item compare" data-app="compare" data-name="Compare" data-url="https://dashboard-yearly.vercel.app/">
        <div class="dock-item-glare"></div>
        <i class="fas fa-chart-line"></i><span>Compare</span><div class="active-indicator"></div>
      </div>
      <div class="dock-item settings" data-app="upload" data-name="Upload Files" data-url="https://josn.vercel.app/">
        <div class="dock-item-glare"></div>
        <i class="fas fa-folder-open"></i><span>Upload</span><div class="active-indicator"></div>
      </div>
      <div class="dock-item exit" id="exitButton" data-app="exit" data-name="Exit System">
        <div class="dock-item-glare"></div>
        <i class="fas fa-sign-out-alt"></i><span>Exit</span><div class="active-indicator"></div>
      </div>
    </div>
  </div>

  <div class="desktop-shortcut" id="previewShortcut">
    <div class="icon-container"><i class="fas fa-display"></i></div>
    <span>Preview</span>
  </div>

  <div class="app-window" id="previewWindow">
    <div class="window-title-bar">
      <div class="window-controls">
        <div class="control-btn close" id="previewCloseBtn"></div>
        <div class="control-btn minimize" id="previewMinimizeBtn"></div>
      </div>
      <div class="window-title" id="previewTitle">Preview</div>
    </div>
    <div class="window-content">
      <div class="preview-placeholder">
        <i class="fas fa-hand-pointer"></i>
        <span>Hover over a dock app to preview</span>
      </div>
      <div class="exit-confirmation">
        <i class="fas fa-sign-out-alt"></i>
        <span>Exit System?</span>
        <p>Click the dock icon to confirm</p>
      </div>
      <iframe src="about:blank" id="previewIframe"></iframe>
    </div>
  </div>

  <script>
    gsap.registerPlugin(MotionPathPlugin);

    (function clock() {
      const el = document.getElementById('utcClock');
      const o  = { timeZone:'Africa/Cairo', day:'2-digit', month:'2-digit', year:'numeric', hour:'numeric', minute:'numeric', second:'numeric', hour12:true };
      const tick = () => el.textContent = new Date().toLocaleString('en-GB', o);
      tick(); setInterval(tick, 1000);
    })();

    const cursorLight = document.querySelector('.cursor-light');
    const widgets = document.querySelectorAll('.widget');

    window.addEventListener('mousemove', e => {
      gsap.to(cursorLight, { duration: 0.9, x: e.clientX, y: e.clientY, ease: 'power2.out', overwrite: 'auto' });
      widgets.forEach(w => {
        const r = w.getBoundingClientRect();
        w.style.setProperty('--mx', (e.clientX - r.left) + 'px');
        w.style.setProperty('--my', (e.clientY - r.top)  + 'px');
      });
    });

    widgets.forEach(w => {
      w.addEventListener('mousemove', e => {
        const r  = w.getBoundingClientRect();
        const nx = (e.clientX - r.left) / r.width  - 0.5;
        const ny = (e.clientY - r.top)  / r.height - 0.5;
        gsap.to(w, { rotateX: -ny * 9, rotateY: nx * 9, duration: 0.35, ease: 'power2.out', overwrite: 'auto' });
      });
      w.addEventListener('mouseleave', () => {
        gsap.to(w, { rotateX: 0, rotateY: 0, duration: 0.9, ease: 'elastic.out(1, 0.5)', overwrite: 'auto' });
      });
    });

    function addRipple(el) {
      el.addEventListener('click', e => {
        const r    = document.createElement('span');
        const rect = el.getBoundingClientRect();
        r.className = 'ripple';
        r.style.left = (e.clientX - rect.left) + 'px';
        r.style.top  = (e.clientY - rect.top)  + 'px';
        el.appendChild(r);
        setTimeout(() => r.remove(), 700);
      });
    }
    document.querySelectorAll('.quick-link, .quick-action-btn').forEach(addRipple);

    function createParticles() {
      const container = document.getElementById('particles');
      container.innerHTML = '';
      const isLight = document.body.getAttribute('data-theme') === 'light';
      const count   = (navigator.hardwareConcurrency || 4) > 4 ? 130 : 75;
      const frag    = document.createDocumentFragment();

      for (let i = 0; i < count; i++) {
        const p      = document.createElement('div');
        p.className  = 'particle';
        const isStar = !isLight && Math.random() < 0.12;
        let size, color, targetOpacity;

        if (isLight) {
          size = Math.random() * 2.5 + 0.8;
          const g = Math.floor(Math.random() * 15 + 232);
          color = `rgba(${g},${g+4},${g+9},${(Math.random() * .45 + .28).toFixed(2)})`;
          targetOpacity = Math.random() * 0.45 + 0.3;
          p.style.filter = `blur(${(Math.random() * 1.2 + 0.3).toFixed(1)}px)`;
        } else if (isStar) {
          size = Math.random() * 2 + 1.5;
          const hue = [210, 260, 190, 30][Math.floor(Math.random() * 4)];
          color = `hsla(${hue},80%,85%,${(Math.random() * .4 + .25).toFixed(2)})`;
          targetOpacity = Math.random() * 0.5 + 0.22;
          p.style.filter = `blur(${(Math.random() * 0.6).toFixed(1)}px)`;
        } else {
          size = Math.random() * 3 + 0.8;
          const v = Math.floor(Math.random() * 30 + 218);
          color = `rgba(${v},${v},${v},${(Math.random() * .4 + .1).toFixed(2)})`;
          targetOpacity = Math.random() * 0.26 + 0.07;
        }

        Object.assign(p.style, {
          width: size + 'px', height: size + 'px',
          left: Math.random() * 100 + 'vw',
          top:  Math.random() * 100 + 'vh',
          background: color,
        });
        p.dataset.opacity = targetOpacity;
        frag.appendChild(p);

        gsap.to(p, {
          duration: Math.random() * 38 + 28,
          x: (Math.random() - .5) * (innerWidth / 3.2),
          y: (Math.random() - .5) * (innerHeight / 3.2),
          scale: Math.random() * .65 + .5,
          opacity: targetOpacity,
          ease: 'sine.inOut', repeat: -1, yoyo: true,
          delay: Math.random() * 12,
        });
      }
      container.appendChild(frag);
    }
    createParticles();

    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(createParticles, 300); });

    const priceLinks = ['https://newlist-eta.vercel.app/', 'https://newlist2.vercel.app/'];
    document.getElementById('pricesButton').addEventListener('click', () =>
      window.open(priceLinks[Math.floor(Math.random() * priceLinks.length)], '_blank')
    );

    const body         = document.body;
    const themeChk     = document.getElementById('theme-checkbox');
    const themeFlash   = document.getElementById('themeFlash');

    themeChk.addEventListener('change', () => {
      gsap.to(themeFlash, {
        opacity: 0.18, duration: 0.16, ease: 'power2.in',
        onComplete: () => {
          body.setAttribute('data-theme', themeChk.checked ? 'dark' : 'light');
          gsap.to(themeFlash, { opacity: 0, duration: 0.38, ease: 'power2.out' });
          gsap.to('#particles .particle', {
            opacity: 0, duration: 0.42, stagger: 0.003,
            onComplete: () => {
              createParticles();
              gsap.fromTo('#particles .particle',
                { opacity: 0, scale: 0.3 },
                { opacity: (i, t) => parseFloat(t.dataset.opacity), scale: 1, duration: 1.4, stagger: 0.007, ease: 'power2.out' }
              );
            }
          });
        }
      });
    });
    if (body.getAttribute('data-theme') === 'dark') themeChk.checked = true;

    function exitSystem() {
      const tl = gsap.timeline({ defaults: { ease: 'expo.in', duration: 0.65 } });
      tl.to(['.dock-container', '.app-window'], { y: '+=220', opacity: 0, stagger: 0.06 })
        .to(['.quick-actions', '.desktop-shortcut'], { x: -220, opacity: 0 }, '-=0.5')
        .to('.system-widgets',  { x: 220, opacity: 0 }, '-=0.5')
        .to('.top-bar',         { y: -160, opacity: 0 }, '-=0.5')
        .to('.particle',        { opacity: 0, scale: 0, duration: 0.6, stagger: 0.003 }, '-=0.5')
        .to('.cursor-light',    { opacity: 0, scale: 0, duration: 0.55 }, '-=0.65')
        .to('.desktop-title',   { scale: 1.15, opacity: 0, duration: 0.7 }, '-=0.5')
        .to('body', {
          opacity: 0, scale: 0.94, duration: 0.8,
          onComplete: () => {
            window.close();
            setTimeout(() => {
              if (!window.closed) {
                try { window.location.href = 'about:blank'; } catch {
                  document.body.innerHTML = '<div style="position:fixed;inset:0;background:#000;color:white;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:24px;">Exited. You may close this tab.</div>';
                }
              }
            }, 150);
          }
        }, '-=0.2');
    }
    document.getElementById('exitButton').addEventListener('click', exitSystem);
    document.getElementById('quickExit').addEventListener('click', exitSystem);

    const dockContainer = document.querySelector('.dock-container');
    const dockItems     = document.querySelectorAll('.dock-item');
    const RADIUS = 125, MAX_SCALE = 1.72, MAX_Y = -26;

    dockContainer.addEventListener('mousemove', e => {
      const dockRect = dockContainer.getBoundingClientRect();
      const mouseX   = e.clientX - dockRect.left;
      dockItems.forEach(item => {
        const r      = item.getBoundingClientRect();
        const center = (r.left - dockRect.left) + r.width / 2;
        const dist   = Math.abs(mouseX - center);
        let scale = 1, y = 0;
        if (dist < RADIUS) {
          const f = Math.pow(1 - dist / RADIUS, 2.6);
          scale = 1 + (MAX_SCALE - 1) * f;
          y     = MAX_Y * f;
        }
        gsap.to(item, { scale, y, duration: 0.14, ease: 'power1.out', overwrite: 'auto' });
      });
    });

    dockContainer.addEventListener('mouseleave', () => {
      gsap.to(dockItems, { scale: 1, y: 0, duration: 0.42, ease: 'elastic.out(1, 0.55)', overwrite: 'auto' });
    });

    dockItems.forEach(item => {
      if (item.dataset.app && item.dataset.app !== 'exit') {
        item.addEventListener('click', () => {
          window.open(item.dataset.url, '_blank');
          dockItems.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          gsap.fromTo(item, { scale: 0.88 }, { scale: 1, duration: 0.55, ease: 'elastic.out(1.2, 0.5)', overwrite: 'auto' });
        });
      }
    });

    window.addEventListener('load', () => {
      const tl = gsap.timeline({ defaults: { ease: 'expo.out', duration: 1.2 } });
      tl.from('.desktop-title',  { opacity: 0, scale: 0.92, duration: 1.8 }, 0.1)
        .from('.top-bar',        { y: -130, opacity: 0, ease: 'back.out(1.3)' }, 0.3)
        .from('.dock-container', { y: 210, opacity: 0, ease: 'elastic.out(1, 0.55)', duration: 1.7 }, 0.38)
        .from(['.quick-actions', '.desktop-shortcut'], { x: -190, opacity: 0, ease: 'back.out(1.5)', stagger: 0.1 }, 0.48)
        .from('#quickLinksWidget', { x: 190, opacity: 0, ease: 'back.out(1.5)' }, 0.48)
        .fromTo('#particles .particle',
          { opacity: 0, scale: 0.3 },
          { opacity: (i, t) => parseFloat(t.dataset.opacity), scale: 1, duration: 1.6, stagger: 0.007, ease: 'power2.out' },
          0.55
        );
    });

    const previewWindow      = document.getElementById('previewWindow');
    const previewTitle       = document.getElementById('previewTitle');
    const previewIframe      = document.getElementById('previewIframe');
    const previewShortcut    = document.getElementById('previewShortcut');
    const previewPlaceholder = previewWindow.querySelector('.preview-placeholder');
    const exitConfirmation   = previewWindow.querySelector('.exit-confirmation');
    const dock               = document.querySelector('.dock');
    let previewState = null;

    function resetPreview() {
      if (previewState === 'placeholder') return;
      previewState = 'placeholder';
      previewTitle.textContent = 'Preview';
      if (previewIframe.src !== 'about:blank') previewIframe.src = 'about:blank';
      previewPlaceholder.style.opacity = '1';
      previewIframe.style.opacity = '0';
      exitConfirmation.style.opacity = '0';
    }

    previewShortcut.addEventListener('click', () => {
      if (previewWindow.classList.contains('visible')) return;
      previewWindow.classList.remove('minimized');
      resetPreview();
      previewWindow.classList.add('visible');
    });

    document.getElementById('previewCloseBtn').addEventListener('click', e => {
      e.stopPropagation();
      previewWindow.classList.remove('visible');
    });

    document.getElementById('previewMinimizeBtn').addEventListener('click', e => {
      e.stopPropagation();
      previewWindow.classList.add('minimized');
      previewWindow.classList.remove('visible');
    });

    dockItems.forEach(item => {
      item.addEventListener('mouseenter', () => {
        if (!previewWindow.classList.contains('visible') || !item.dataset.app) return;
        const app = item.dataset.app;
        if (previewState === app) return;
        previewState = app;
        if (app === 'exit') {
          previewTitle.textContent = item.dataset.name;
          previewPlaceholder.style.opacity = '0';
          previewIframe.style.opacity = '0';
          if (previewIframe.src !== 'about:blank') previewIframe.src = 'about:blank';
          exitConfirmation.style.opacity = '1';
        } else if (item.dataset.url) {
          previewTitle.textContent = item.dataset.name;
          previewIframe.src = item.dataset.url;
          previewPlaceholder.style.opacity = '0';
          exitConfirmation.style.opacity = '0';
          previewIframe.style.opacity = '1';
        }
      });
    });

    dock.addEventListener('mousemove', e => {
      if (!previewWindow.classList.contains('visible')) return;
      if (e.target.classList.contains('dock')) resetPreview();
    });
  </script>
</body>
</html>
